name: live-code-execution

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      EXECUTION_TIMEOUT_MS: ${EXECUTION_TIMEOUT_MS:-5000}
      EXECUTION_MEMORY_MB: ${EXECUTION_MEMORY_MB:-128}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - app-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: worker
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      EXECUTION_TIMEOUT_MS: ${EXECUTION_TIMEOUT_MS:-5000}
      EXECUTION_MEMORY_MB: ${EXECUTION_MEMORY_MB:-128}
      MIN_RUNNING_MS: ${MIN_RUNNING_MS:-800}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["node", "src/worker.js"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner_tmp:/runner-tmp
    networks:
      - app-network

  database:
    image: postgres:16-alpine
    container_name: database
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  runner_tmp:
    name: runner_tmp